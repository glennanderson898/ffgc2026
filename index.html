* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --fire:#FFB300; --fire2:#FFC933; --gold:#FFD700;
  --dark:#1a1a1a; --dark2:#222222; --dark3:#2a2a2a;
  --surface:#1c1c1c; --surface2:#242424;
  --border:rgba(255,255,255,0.08); --border-fire:rgba(255,179,0,0.35);
  --text:#f0f0f0; --muted:#888; --muted2:#555;
  --success:#00e676; --danger:#ff1744;
  --gff:'GFF', 'Arial Black', Arial, sans-serif;
}
body { font-family:var(--gff); background:var(--dark); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* NAV */
nav {
  background:#111; border-bottom:2px solid var(--fire);
  display:flex; align-items:center; padding:0 28px; height:62px;
  position:sticky; top:0; z-index:100;
}
.nav-logo { display:flex; align-items:center; gap:12px; margin-right:40px; }
.ff-logo-img { width:44px; height:44px; object-fit:contain; mix-blend-mode:lighten; }
.nav-title { font-family:var(--gff); font-size:18px; letter-spacing:3px; color:#fff; line-height:1.1; }
.nav-sub { font-size:9px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
.nav-links { display:flex; }
.nav-link {
  padding:0 18px; height:62px; display:flex; align-items:center;
  font-family:var(--gff); font-size:12px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); cursor:pointer; border-bottom:3px solid transparent;
  transition:all 0.2s; margin-top:2px;
}
.nav-link:hover { color:var(--text); }
.nav-link.active { color:var(--fire); border-bottom-color:var(--fire); }
.nav-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.nav-badge { font-family:var(--gff); font-size:11px; letter-spacing:2px; background:var(--fire); color:#fff; padding:6px 14px; }

/* HERO */
.hero {
  background:#0d0d0d; border-bottom:1px solid var(--border-fire);
  padding:36px 28px 32px; position:relative; overflow:hidden;
}
.hero::after {
  content:''; position:absolute; right:-80px; top:-80px;
  width:360px; height:360px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,179,0,0.1) 0%, transparent 70%);
  pointer-events:none;
}
.hero-eyebrow {
  font-family:var(--gff); font-size:9px; letter-spacing:5px; color:var(--fire);
  text-transform:uppercase; margin-bottom:6px;
  display:flex; align-items:center; gap:10px;
}
.hero-eyebrow::before { content:''; width:24px; height:1px; background:var(--fire); }
.hero-title {
  font-family:var(--gff); font-size:clamp(32px,5vw,60px);
  letter-spacing:5px; text-transform:uppercase;
  line-height:1; color:#fff; margin-bottom:4px;
}
.hero-title span { color:var(--fire); }
.hero-sub { font-size:9px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:22px; }
.hero-stats { display:flex; gap:28px; flex-wrap:wrap; }
.hero-stat-num { font-family:var(--gff); font-size:30px; color:var(--fire); line-height:1; }
.hero-stat-label { font-size:8px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-top:2px; }

/* TABS */
.page-tabs {
  display:flex; border-bottom:1px solid var(--border);
  background:var(--dark2); padding:0 28px;
}
.tab {
  padding:13px 24px; border:none; background:transparent; color:var(--muted); cursor:pointer;
  font-family:var(--gff); font-size:11px; letter-spacing:3px; text-transform:uppercase;
  border-bottom:3px solid transparent; transition:all 0.2s; white-space:nowrap;
}
.tab.active { color:var(--fire); border-bottom-color:var(--fire); }
.tab:hover:not(.active) { color:var(--text); }

/* CONTENT */
.content { padding:20px 28px; display:grid; grid-template-columns:440px 1fr; gap:16px; align-items:start; }
.content.full { grid-template-columns:1fr; }

/* PANEL */
.panel { background:var(--dark2); border:1px solid var(--border); }
.panel-head {
  padding:12px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; background:var(--dark3);
}
.panel-head-title { font-family:var(--gff); font-size:14px; letter-spacing:3px; text-transform:uppercase; color:var(--fire); }
.pill { font-size:9px; letter-spacing:2px; text-transform:uppercase; padding:3px 8px; border:1px solid var(--border-fire); color:var(--fire); background:rgba(255,179,0,0.08); font-family:var(--gff); }
.pill-success { border-color:rgba(0,230,118,0.3); color:var(--success); background:rgba(0,230,118,0.08); }
.pill-danger { border-color:rgba(255,23,68,0.3); color:var(--danger); background:rgba(255,23,68,0.08); }

/* LEADERBOARD */
.lb-header { display:grid; grid-template-columns:28px 1fr 50px 50px 44px 65px; gap:6px; padding:10px 16px; border-bottom:1px solid var(--border); }
.lb-col { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); text-align:right; font-family:var(--gff); }
.lb-col:nth-child(2) { text-align:left; }
.player-row { display:grid; grid-template-columns:28px 1fr 50px 50px 44px 65px; gap:6px; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.03); align-items:center; transition:background 0.15s; }
.player-row:hover { background:rgba(255,179,0,0.05); }
.player-row.eliminated { opacity:0.25; text-decoration:line-through; }
.rank-num { font-family:var(--gff); font-size:17px; color:var(--muted2); text-align:center; }
.rank-num.gold { color:var(--gold); }
.rank-num.silver { color:#c0c0c0; }
.rank-num.bronze { color:#cd7f32; }
.player-name { font-family:var(--gff); font-size:13px; letter-spacing:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.stat { font-size:13px; color:var(--muted); text-align:right; font-family:var(--gff); }
.stat.score { font-size:16px; color:var(--text); }
.cut-line { display:flex; align-items:center; gap:8px; padding:6px 16px; color:var(--danger); font-size:10px; letter-spacing:3px; text-transform:uppercase; background:rgba(255,23,68,0.04); border-top:1px solid rgba(255,23,68,0.2); border-bottom:1px solid rgba(255,23,68,0.2); font-family:var(--gff); }

/* MATCH LAYOUT */
.match-action-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:18px 24px; background:var(--dark3); border-bottom:1px solid var(--border); }
.stage-label { font-family:var(--gff); font-size:11px; letter-spacing:4px; color:var(--fire); text-transform:uppercase; }
.match-counter { font-family:var(--gff); font-size:28px; color:var(--fire); letter-spacing:2px; line-height:1.1; }
.match-scoreline {
  display:grid; grid-template-columns:1fr auto 1fr;
  align-items:center; gap:0;
  padding:18px 24px; border-bottom:1px solid var(--border);
  background:var(--dark3);
}
.match-team-header { display:flex; align-items:center; gap:12px; }
.team-a-header { justify-content:flex-start; }
.team-b-header { justify-content:flex-end; }
.team-header-label {
  font-family:var(--gff); font-size:13px; letter-spacing:3px;
  text-transform:uppercase; color:var(--fire);
}
.score-input {
  width:56px; background:#0d0d0d; border:2px solid var(--border-fire);
  color:var(--fire); padding:6px 4px; font-family:var(--gff);
  font-size:22px; text-align:center; outline:none;
}
.score-input:focus { border-color:var(--fire2); }
.vs-badge {
  font-family:var(--gff); font-size:13px; letter-spacing:4px;
  color:var(--muted); padding:0 20px; text-align:center;
}
.match-columns {
  display:grid; grid-template-columns:1fr 1fr;
  gap:0; border-bottom:1px solid var(--border);
}
.team-col { padding:16px 24px; }
.team-col-b { border-left:1px solid var(--border); }
.player-input-row {
  display:flex; align-items:center; gap:8px;
  padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03);
}
.player-input-row:last-child { border-bottom:none; }
.player-input-name {
  font-family:var(--gff); font-size:13px; letter-spacing:1px;
  flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.stat-inputs { display:flex; gap:6px; }
.stat-input-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
.stat-input-wrap label {
  font-size:7px; letter-spacing:2px; color:var(--muted2);
  text-transform:uppercase; font-family:var(--gff);
}
.stat-input-wrap input {
  width:52px; background:#0d0d0d; border:1px solid rgba(255,255,255,0.1);
  color:var(--text); padding:6px 4px; font-family:var(--gff);
  font-size:14px; text-align:center; outline:none; transition:border-color 0.2s;
}
.stat-input-wrap input:focus { border-color:var(--fire); }
.bye-row {
  padding:10px 24px; font-size:11px; color:var(--muted);
  letter-spacing:2px; font-family:var(--gff); border-bottom:1px solid var(--border);
}
.scoring-hint { font-size:11px; color:var(--muted); letter-spacing:2px; font-family:var(--gff); }
.match-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }

/* BUTTONS */
.btn { border:none; cursor:pointer; font-family:var(--gff); font-size:11px; letter-spacing:3px; text-transform:uppercase; padding:8px 16px; transition:all 0.15s; }
.btn-fire { background:var(--fire); color:#fff; }
.btn-fire:hover { background:var(--fire2); }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
.btn-danger { background:transparent; color:var(--danger); border:1px solid rgba(255,23,68,0.3); }
.btn-danger:hover { background:rgba(255,23,68,0.1); }
.btn-success { background:var(--success); color:#000; }
.btn-success:hover { opacity:0.9; }
.btn-sm { padding:5px 10px; font-size:9px; }

/* HISTORY */
.history-list { display:flex; flex-direction:column; gap:1px; background:var(--border); }
.history-card { background:var(--dark2); padding:14px 16px; }
.history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.history-id { font-family:var(--gff); font-size:12px; letter-spacing:3px; color:var(--muted); }
.history-teams { display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center; font-size:10px; }
.history-team-names { font-family:var(--gff); font-size:13px; line-height:1.8; color:var(--text); }
.history-team-b { text-align:right; }
.history-score { font-family:var(--gff); font-size:28px; color:#fff; letter-spacing:3px; text-align:center; }
.history-stats-row { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:none; }
.history-stats-row.open { display:block; }
.stats-grid-edit { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:8px; }
.player-stat-edit { background:var(--dark3); padding:8px; border:1px solid var(--border); }
.pse-name { font-family:var(--gff); font-size:9px; letter-spacing:1px; color:var(--muted); margin-bottom:6px; }
.pse-inputs { display:flex; gap:6px; }
.pse-wrap label { font-size:7px; letter-spacing:1px; color:var(--muted2); display:block; margin-bottom:2px; font-family:var(--gff); text-transform:uppercase; }
.pse-wrap input { width:50px; background:#0d0d0d; border:1px solid rgba(255,255,255,0.1); color:var(--text); padding:4px 6px; font-family:var(--gff); font-size:11px; text-align:center; outline:none; }
.pse-wrap input:focus { border-color:var(--fire); }

/* EMPTY STATE */
.empty-state { text-align:center; padding:48px 24px; color:var(--muted); }
.empty-state-icon { font-size:40px; margin-bottom:12px; opacity:0.3; }
.empty-state-text { font-family:var(--gff); font-size:11px; letter-spacing:3px; text-transform:uppercase; }

/* INFO STRIP */
.info-strip { display:flex; background:var(--dark3); border-bottom:1px solid var(--border); }
.info-item { padding:8px 16px; border-right:1px solid var(--border); }
.info-item:last-child { border-right:none; }
.info-label { font-size:7px; letter-spacing:3px; text-transform:uppercase; color:var(--muted2); font-family:var(--gff); }
.info-val { font-family:var(--gff); font-size:15px; color:var(--fire); line-height:1.2; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; display:flex; align-items:center; justify-content:center; }
.modal-overlay.hidden { display:none; }
.modal { background:var(--dark2); border:1px solid var(--border-fire); padding:28px; max-width:660px; width:94%; }
.modal-title { font-family:var(--gff); font-size:16px; letter-spacing:3px; color:var(--fire); margin-bottom:8px; }
.modal-text { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:16px; font-family:var(--gff); }
.modal-btns { display:flex; gap:8px; flex-wrap:wrap; }
.modal-btns.player-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
.modal-cancel { margin-top:8px; padding-top:12px; border-top:1px solid var(--border); display:flex; justify-content:center; }
.btn-player { background:var(--fire); color:#000; border:none; font-family:var(--gff); font-size:11px; letter-spacing:2px; padding:10px 14px; cursor:pointer; text-align:center; transition:all 0.15s; text-transform:uppercase; }
.btn-player:hover { background:var(--fire2); }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--dark); }
::-webkit-scrollbar-thumb { background:var(--fire); }

<script>
const SCORING = { win:50, round:10, kill:5, assist:2 };
const ALL_PLAYERS = ["Glenn","Ali","Hamza Ayoub","Amine","Hamzah Albar","Youssef Saaf","Anjar","Gilbert","Simo","Nawfal","Chaimaa","Khaoula"];

let state = {
  stage: 1,
  activePlayers: [...ALL_PLAYERS],
  eliminated: [],
  players: {},
  matchHistory: [],
  currentMatch: null,
  matchesInStage: 0,
  page: 'match'
};

// INIT
function initPlayers() {
  ALL_PLAYERS.forEach((name, i) => {
    state.players[name] = {
      name, initialRank: i+1,
      stage1Score: 0, stage2Score: 0,
      stage1Matches: 0, stage2Matches: 0
    };
  });
}

function getScore(p) { return (p.stage1Score||0)+(p.stage2Score||0); }
function getStageScore(p) { return state.stage===1 ? p.stage1Score : p.stage2Score; }
function getMP(p) { return (p.stage1Matches||0)+(p.stage2Matches||0); }

function getRanked(names) {
  return names.slice().sort((a,b) => {
    const diff = getScore(state.players[b]) - getScore(state.players[a]);
    return diff !== 0 ? diff : state.players[a].initialRank - state.players[b].initialRank;
  });
}

// MATCH GENERATION
function snakeDraft(ranked8) {
  return {
    teamA: [ranked8[0], ranked8[3], ranked8[4], ranked8[7]],
    teamB: [ranked8[1], ranked8[2], ranked8[5], ranked8[6]]
  };
}

function getMatchesPlayed(name) {
  let count = 0;
  state.matchHistory.forEach(m => {
    if (m.stage === state.stage && (m.teamA.includes(name) || m.teamB.includes(name))) count++;
  });
  return count;
}

function getDynamicByes() {
  if (state.activePlayers.length === 8) return [];

  const maxMatches = 12;
  const playsPerPlayer = 8;
  const players = state.activePlayers;
  const completedMatches = state.matchHistory.filter(m => m.stage === state.stage).length;
  const remainingMatches = maxMatches - completedMatches;

  const playedSoFar = {};
  players.forEach(name => {
    playedSoFar[name] = state.matchHistory.filter(m =>
      m.stage === state.stage && (m.teamA.includes(name) || m.teamB.includes(name))
    ).length;
  });

  const mustPlay = {};
  players.forEach(name => {
    mustPlay[name] = Math.max(0, playsPerPlayer - playedSoFar[name]);
  });

  // Sort ascending by mustPlay — least urgent = bye candidates
  const sorted = [...players].sort((a, b) => {
    const diff = mustPlay[a] - mustPlay[b];
    return diff !== 0 ? diff : Math.random() - 0.5;
  });

  const byes = [];
  const canBye = sorted.filter(name => mustPlay[name] < remainingMatches);

  for (let i = 0; i < 4 && i < canBye.length; i++) {
    byes.push(canBye[i]);
  }

  // Edge case: fill remaining bye slots if needed
  if (byes.length < 4) {
    const remaining = sorted.filter(n => !byes.includes(n));
    while (byes.length < 4 && remaining.length > 0) byes.push(remaining.shift());
  }

  return byes;
}

function buildMatchFromRank(matchNum) {
  const byes = getDynamicByes();
  const active = state.activePlayers.filter(p => !byes.includes(p));
  const ranked = getRanked(active);
  const { teamA, teamB } = snakeDraft(ranked);
  return { id: matchNum, stage: state.stage, teamA, teamB, byes, result: null };
}

function swapPlayer(activeName) {
  if (!state.currentMatch) return;
  const m = state.currentMatch;
  if (!m.byes.length) return;

  const btns = m.byes.map(byeName => ({
    label: byeName,
    cls: 'btn-ghost',
    fn: () => {
      const inA = m.teamA.includes(activeName);
      if (inA) { m.teamA = m.teamA.map(p => p === activeName ? byeName : p); }
      else { m.teamB = m.teamB.map(p => p === activeName ? byeName : p); }
      m.byes = m.byes.map(p => p === byeName ? activeName : p);
      hideModal();
      renderAll();
    }
  }));
  btns.push({ label: 'CANCEL', cls: 'btn-ghost', fn: hideModal });
  showModal('WHO REPLACES ' + activeName + '?', 'Pick a bye player to swap in:', btns, true);
}

function generateNextMatch() {
  const nextNum = state.matchesInStage + 1;
  const maxMatches = state.activePlayers.length === 12 ? 12 : 8;
  if (nextNum > maxMatches) return;
  state.currentMatch = buildMatchFromRank(nextNum);
  document.getElementById('nextMatchBtn').style.display = 'none';
  renderAll();
}

function reshuffleMatch() {
  if (!state.currentMatch) return;
  const byes = state.currentMatch.byes;
  const active = state.activePlayers.filter(p => !byes.includes(p));
  const ranked = getRanked(active); // sorted by score

  // Split into top half and bottom half, shuffle each half, then snake draft
  // This keeps balance (strong vs strong, weak vs weak) but randomizes within tiers
  const top = ranked.slice(0, 4);
  const bot = ranked.slice(4, 8);

  // Fisher-Yates shuffle
  const shuffle = arr => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  };

  shuffle(top);
  shuffle(bot);

  // Interleave: top[0], bot[0], top[1], bot[1]... then snake draft
  const interleaved = [top[0], bot[0], top[1], bot[1], top[2], bot[2], top[3], bot[3]];
  const { teamA, teamB } = snakeDraft(interleaved);

  state.currentMatch.teamA = teamA;
  state.currentMatch.teamB = teamB;
  renderMatchPanel();
  saveState();
}
function submitMatch() {
  const m = state.currentMatch;
  if (!m) return;

  const sA = parseInt(document.getElementById('scoreA')?.value);
  const sB = parseInt(document.getElementById('scoreB')?.value);

  if (isNaN(sA) || isNaN(sB) || sA < 0 || sB < 0) { alert('Enter valid scores!'); return; }
  if (sA === sB) { alert('No ties in Clash Squad!'); return; }

  const winnerTeam = sA > sB ? 'A' : 'B';
  const kills = {}, assists = {};
  [...m.teamA, ...m.teamB].forEach(name => {
    const k = name.replace(/\s+/g,'_');
    kills[name] = parseInt(document.getElementById('k_'+k)?.value||0);
    assists[name] = parseInt(document.getElementById('a_'+k)?.value||0);
  });

  // apply scores
  applyMatchScores(m, winnerTeam, sA, sB, kills, assists);

  // save to history
  const histMatch = { ...m, result: { winnerTeam, scoreA:sA, scoreB:sB, kills:{...kills}, assists:{...assists} } };
  state.matchHistory.push(histMatch);
  state.matchesInStage++;
  state.currentMatch = null;
  refreshNextBtn();
  renderAll();
  renderHistory();
}

function applyMatchScores(m, winnerTeam, sA, sB, kills, assists) {
  const allP = [...m.teamA, ...m.teamB];
  allP.forEach(name => {
    const p = state.players[name];
    const isA = m.teamA.includes(name);
    const won = (winnerTeam==='A'&&isA)||(winnerTeam==='B'&&!isA);
    const rounds = isA ? sA : sB;
    const k = kills[name]||0;
    const a = assists[name]||0;
    const score = (won?SCORING.win:0)+rounds*SCORING.round+k*SCORING.kill+a*SCORING.assist;
    if (m.stage===1) { p.stage1Score+=score; p.stage1Matches++; }
    else { p.stage2Score+=score; p.stage2Matches++; }
  });
}

function deductMatchScores(m) {
  if (!m.result) return;
  const { winnerTeam, scoreA, scoreB, kills, assists } = m.result;
  const allP = [...m.teamA, ...m.teamB];
  allP.forEach(name => {
    const p = state.players[name];
    if (!p) return;
    const isA = m.teamA.includes(name);
    const won = (winnerTeam==='A'&&isA)||(winnerTeam==='B'&&!isA);
    const rounds = isA ? scoreA : scoreB;
    const k = kills[name]||0;
    const a = assists[name]||0;
    const score = (won?SCORING.win:0)+rounds*SCORING.round+k*SCORING.kill+a*SCORING.assist;
    if (m.stage===1) { p.stage1Score-=score; p.stage1Matches--; }
    else { p.stage2Score-=score; p.stage2Matches--; }
    // floor at 0
    if(p.stage1Score<0) p.stage1Score=0;
    if(p.stage2Score<0) p.stage2Score=0;
    if(p.stage1Matches<0) p.stage1Matches=0;
    if(p.stage2Matches<0) p.stage2Matches=0;
  });
}

// HISTORY OPERATIONS
function deleteMatch(histIdx) {
  const m = state.matchHistory[histIdx];
  showModal(
    'DELETE MATCH?',
    `Delete Stage ${m.stage} Match ${String(m.id).padStart(2,'0')}? This will deduct all points from that match and the slot will be replaced with a new match.`,
    [
      { label:'DELETE', cls:'btn-danger', fn: () => {
        deductMatchScores(m);
        state.matchHistory.splice(histIdx, 1);
        state.matchesInStage = Math.max(0, state.matchesInStage-1);
        // show next match btn if not already showing a current match
        if (!state.currentMatch) {
          refreshNextBtn();
        }
        hideModal();
        renderAll();
      }},
      { label:'CANCEL', cls:'btn-ghost', fn: hideModal }
    ]
  );
}

function saveMatchEdit(histIdx) {
  const m = state.matchHistory[histIdx];
  // deduct old
  deductMatchScores(m);

  const sA = parseInt(document.getElementById(`esA_${histIdx}`)?.value);
  const sB = parseInt(document.getElementById(`esB_${histIdx}`)?.value);
  if (isNaN(sA)||isNaN(sB)) { alert('Invalid scores'); applyMatchScores(m, m.result.winnerTeam, m.result.scoreA, m.result.scoreB, m.result.kills, m.result.assists); return; }
  if (sA===sB) { alert('No ties!'); applyMatchScores(m, m.result.winnerTeam, m.result.scoreA, m.result.scoreB, m.result.kills, m.result.assists); return; }

  const newWinner = sA > sB ? 'A' : 'B';
  const kills = {}, assists = {};
  [...m.teamA,...m.teamB].forEach(name => {
    const k = name.replace(/\s+/g,'_');
    kills[name] = parseInt(document.getElementById(`ek_${histIdx}_${k}`)?.value||0);
    assists[name] = parseInt(document.getElementById(`ea_${histIdx}_${k}`)?.value||0);
  });

  m.result = { winnerTeam:newWinner, scoreA:sA, scoreB:sB, kills:{...kills}, assists:{...assists} };
  applyMatchScores(m, newWinner, sA, sB, kills, assists);
  renderAll();
}

// MODAL
function showModal(title, text, buttons, isPlayerPick) {
  document.getElementById('modalTitle').textContent = title.toUpperCase();
  document.getElementById('modalText').innerHTML = text.replace(/\n/g,'<br>');
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = '';

  if (isPlayerPick) {
    const cancelBtn = buttons.find(b => b.label === 'CANCEL');
    const playerBtns = buttons.filter(b => b.label !== 'CANCEL');

    const grid = document.createElement('div');
    grid.className = 'modal-btns player-grid';
    playerBtns.forEach(b => {
      const el = document.createElement('button');
      el.className = 'btn-player';
      el.textContent = b.label.toUpperCase();
      el.onclick = b.fn;
      grid.appendChild(el);
    });
    btns.appendChild(grid);

    if (cancelBtn) {
      const cancelWrap = document.createElement('div');
      cancelWrap.className = 'modal-cancel';
      cancelWrap.style.textAlign = 'center';
      const el = document.createElement('button');
      el.className = 'btn btn-ghost';
      el.textContent = 'CANCEL';
      el.onclick = cancelBtn.fn;
      cancelWrap.appendChild(el);
      btns.appendChild(cancelWrap);
    }
  } else {
    btns.className = 'modal-btns';
    buttons.forEach(b => {
      const el = document.createElement('button');
      el.className = 'btn ' + b.cls;
      el.textContent = b.label;
      el.onclick = b.fn;
      btns.appendChild(el);
    });
  }

  document.getElementById('modalOverlay').classList.remove('hidden');
}
function hideModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) hideModal(); });

        + '<div class="pse-wrap"><label>Ast</label><input type="number" min="0" max="20" value="' + (r.assists[name]||0) + '" id="ea_' + idx + '_' + k + '"></div>'

      + '<div class="history-header">'

      + '</div></div>'

      + '<div style="font-family:var(--gff);font-size:13px;letter-spacing:2px;color:var(--fire)">TEAM A</div>'

      + '<div style="font-family:var(--gff);font-size:13px;letter-spacing:2px;color:var(--muted);text-align:right">TEAM B</div>'
      + '</div>';

    if (isOpen) {
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px;padding-top:8px;border-top:1px solid var(--border)">'
        + '<div><div style="font-family:var(--gff);font-size:9px;letter-spacing:3px;color:var(--fire2);margin-bottom:8px">SCORE A</div>'
        + '<input type="number" min="0" max="6" value="' + r.scoreA + '" id="esA_' + idx + '" style="width:60px;background:#111;border:1px solid var(--border-fire);color:var(--fire);padding:5px;font-family:var(--gff);font-size:16px;text-align:center;outline:none;"></div>'
        + '<div><div style="font-family:var(--gff);font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:8px">SCORE B</div>'
        + '<input type="number" min="0" max="6" value="' + r.scoreB + '" id="esB_' + idx + '" style="width:60px;background:#111;border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:5px;font-family:var(--gff);font-size:16px;text-align:center;outline:none;"></div>'
        + '</div>'
        + '<div class="stats-grid-edit" style="margin-bottom:10px">' + [...m.teamA,...m.teamB].map(makeEditRow).join('') + '</div>'
        + '<button class="btn btn-fire btn-sm" onclick="saveMatchEdit(' + idx + ')">SAVE CHANGES</button>';

    }

    }

    html += '</div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

// SUPABASE SAVE/LOAD
async function saveState() {
  const data = {
    stage: state.stage,
    activePlayers: state.activePlayers,
    eliminated: state.eliminated,
    players: state.players,
    matchHistory: state.matchHistory,
    currentMatch: state.currentMatch,
    matchesInStage: state.matchesInStage
  };
  try {
    await fetch(SUPABASE_URL + '/rest/v1/ffgc_state?id=eq.main', {
      method: 'PATCH',
      headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ data, updated_at: new Date().toISOString() })
    });
  } catch(e) { console.warn('Supabase save failed', e); }
}

async function loadState() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/ffgc_state?id=eq.main&select=data', {
      headers: SB_HEADERS
    });
    const rows = await res.json();
    if (!rows.length || !rows[0].data || !rows[0].data.stage) return false;
    const s = rows[0].data;
    state.stage = s.stage || 1;
    state.activePlayers = s.activePlayers || [...ALL_PLAYERS];
    state.eliminated = s.eliminated || [];
    state.players = s.players || {};
    state.matchHistory = s.matchHistory || [];
    state.currentMatch = s.currentMatch || null;
    state.matchesInStage = s.matchesInStage || 0;
    ALL_PLAYERS.forEach((name, i) => {
      if (!state.players[name]) {
        state.players[name] = { name, initialRank:i+1, stage1Score:0, stage2Score:0, stage1Matches:0, stage2Matches:0 };
      }
    });
    return true;
  } catch(e) { console.warn('Supabase load failed', e); return false; }
}

function resetState() {
  if (!isAdmin) { promptAdmin(() => resetState()); return; }
  showModal('RESET ALL DATA?',
    'This will permanently delete all match history, scores, and progress. This cannot be undone.',
    [
      { label:'RESET', cls:'btn-danger', fn: async () => {
        state.stage = 1;
        state.activePlayers = [...ALL_PLAYERS];
        state.eliminated = [];
        state.players = {};
        state.matchHistory = [];
        state.currentMatch = null;
        state.matchesInStage = 0;
        state.page = 'match';
        initPlayers();
        hideModal();
        refreshNextBtn();
        await saveState();
        renderAll();
      }},
      { label:'CANCEL', cls:'btn-ghost', fn: hideModal }
    ]
  );
}

  const maxM = state.activePlayers.length >= 12 ? 12 : 8;
  const show = !state.currentMatch && state.matchesInStage < maxM;
